version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: tradepilot
      POSTGRES_PASSWORD: tradepilot
      POSTGRES_DB: tradepilot
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tradepilot"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    # Not used by the MVP yet. Reserved for caching and background job
    # queues (e.g. async AI jobs, CSV import processing) in later iterations.

  api:
    build:
      context: ./apps/api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://tradepilot:tradepilot@postgres:5432/tradepilot
      CORS_ORIGINS: http://localhost:3010,http://127.0.0.1:3010
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./apps/api:/app
    command: >
      sh -c "python -m app.seed && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  web:
    build:
      context: ./apps/web
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3010:3010"
    depends_on:
      - api

volumes:
  postgres_data:
